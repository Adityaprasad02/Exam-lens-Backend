py.url=${PY_URL}
frontend.url=${FRONTEND_URL}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQ_SIZE}
spring.ai.a4j.base.url=${AI_BASE_URL}
spring.ai.a4j.api.key=${API_KEY}
model=${AI_MODEL}

# Production Performance Tuning
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=20000
server.tomcat.accept-count=200
server.connection-timeout=30000

# HTTP Client Connection Pooling
http.client.max-connections=400
http.client.max-per-route=100
http.client.connection-timeout=30000
http.client.socket-timeout=60000

# Logging
logging.level.com.Examlens_Backend.FileHandler=INFO
logging.level.org.apache.http=WARN